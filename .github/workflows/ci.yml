name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: vx.x.x

      - name: Install GStreamer dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            pkg-config

      - name: Install GStreamer dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad gst-plugins-ugly pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$(brew --prefix)/lib:$LIBRARY_PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$(brew --prefix)/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install GStreamer dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          GST_VERSION: "1.26.11"
          GST_INSTALL_DIR: 'C:\Program Files\gstreamer'
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'

          choco install -y --no-progress pkgconfiglite

          $runtimeMsi = Join-Path $env:RUNNER_TEMP 'gstreamer.msi'
          $develMsi   = Join-Path $env:RUNNER_TEMP 'gstreamer-devel.msi'
          $base = "https://gstreamer.freedesktop.org/data/pkg/windows/$env:GST_VERSION/msvc"
          Invoke-WebRequest -Uri "$base/gstreamer-1.0-msvc-x86_64-$env:GST_VERSION.msi"       -OutFile $runtimeMsi
          Invoke-WebRequest -Uri "$base/gstreamer-1.0-devel-msvc-x86_64-$env:GST_VERSION.msi" -OutFile $develMsi

          function Install-Msi($msi, $logName) {
            $log = Join-Path $env:RUNNER_TEMP $logName
            $args = @('/i', $msi, '/quiet', '/qn', '/norestart', '/l*v', $log,
                      'ADDLOCAL=ALL', "INSTALLDIR=`"$env:GST_INSTALL_DIR`"")
            $p = Start-Process -FilePath msiexec.exe -ArgumentList $args -Wait -NoNewWindow -PassThru
            if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) {
              Write-Host "msiexec failed (exit $($p.ExitCode)). Tail of log:"
              Get-Content $log -Tail 50
              exit $p.ExitCode
            }
          }
          Install-Msi $runtimeMsi 'gstreamer-runtime.log'
          Install-Msi $develMsi   'gstreamer-devel.log'

          $gstRoot = Join-Path $env:GST_INSTALL_DIR '1.0\msvc_x86_64'
          $pcFile  = Join-Path $gstRoot 'lib\pkgconfig\gstreamer-1.0.pc'
          if (-not (Test-Path $pcFile)) {
            Write-Host "gstreamer-1.0.pc not found at $pcFile"
            Get-ChildItem $env:GST_INSTALL_DIR -Recurse -Filter '*.pc' -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            exit 1
          }

          "PKG_CONFIG_PATH=$gstRoot\lib\pkgconfig"        | Out-File -FilePath $env:GITHUB_ENV  -Append -Encoding utf8
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot"       | Out-File -FilePath $env:GITHUB_ENV  -Append -Encoding utf8
          "$gstRoot\bin"                                  | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies (Node.js 20)
        run: npm ci

      - name: Build TypeScript bundle (Node.js 20)
        run: npm run build:ts

      - name: Run unit tests (Node.js 20)
        run: npm run test:unit

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (Node.js LTS)
        run: npm ci

      - name: Build TypeScript bundle (Node.js LTS)
        run: npm run build:ts

      - name: Lint code (Node.js LTS)
        run: npm run lint

      - name: Run unit tests (Node.js LTS)
        run: npm run test:unit

      - name: Setup Node.js latest
        uses: actions/setup-node@v4
        with:
          node-version: node
          cache: "npm"

      - name: Install dependencies (Node.js latest)
        run: npm ci

      - name: Build TypeScript bundle (Node.js latest)
        run: npm run build:ts

      - name: Run unit tests (Node.js latest)
        run: npm run test:unit

      - name: Install dependencies (Bun)
        run: bun install --ignore-scripts

      - name: Build native addon + TypeScript bundle (Bun)
        run: |
          bun --bun x node-gyp rebuild
          bun --bun x rolldown -c rolldown.config.mjs

      - name: Run unit tests (Bun)
        run: bun x vitest --no-watch --no-file-parallelism --sequence.concurrent=false

      - name: Install dependencies (Deno)
        run: deno install --node-modules-dir=auto

      - name: Build native addon + TypeScript bundle (Deno)
        run: |
          deno run -A --node-modules-dir=auto npm:node-gyp rebuild
          deno run -A --node-modules-dir=auto npm:rolldown -c rolldown.config.mjs

      - name: Run unit tests (Deno)
        run: deno run -A --node-modules-dir=auto npm:vitest --no-watch --no-file-parallelism --sequence.concurrent=false
